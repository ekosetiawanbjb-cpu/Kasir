<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KIOS 88 - POS FINAL PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef6ff}
header{background:#007bff;color:#fff;padding:15px;font-size:20px}
.container{padding:15px}
button{padding:10px 14px;margin:4px;border:none;border-radius:8px;cursor:pointer}
input{padding:8px;margin:5px}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.item{background:#fff;border:1px solid #ccc;padding:10px;border-radius:10px;cursor:pointer}
.kategori-btn{background:#e3f0ff;color:#007bff}
.kategori-btn.active{background:#007bff;color:#fff}
</style>
</head>

<body>
<header>🔥 KIOS 88 - POS PRO+</header>

<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama">
<input id="kategori" placeholder="Kategori">
<input id="barcode" placeholder="Barcode">
<input id="modal" type="number" placeholder="Modal">
<input id="jual" type="number" placeholder="Jual">
<input id="stok" type="number" placeholder="Stok">
<button onclick="tambahProduk()">Tambah</button>
</div>

<div class="card">
<h3>Produk</h3>
<input id="search" placeholder="Cari..." onkeyup="renderProduk()">
<div id="kategoriFilter"></div>
<div id="produkGrid" class="grid"></div>
</div>

<div class="card">
<h3>Keranjang</h3>
<div id="keranjang"></div>
<p>Total: Rp <span id="total">0</span></p>
<input id="bayar" placeholder="Bayar" type="number">
<button onclick="hitungKembalian()">Hitung</button>
<p>Kembalian: Rp <span id="kembalian">0</span></p>
<button onclick="cetakStruk()">Cetak Struk</button>
<button onclick="selesai()">Selesai</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGZ7pQrWMxNXBWP7Dnxqq7M8pheGHaUQ4",
  authDomain: "kios-88.firebaseapp.com",
  projectId: "kios-88",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dataProduk=[];
let docIds=[];
let keranjangData=[];
let kategoriAktif=null;

// realtime
db.collection('produk').onSnapshot(snap=>{
 dataProduk=snap.docs.map(d=>d.data());
 docIds=snap.docs.map(d=>d.id);
 renderKategori();
 renderProduk();
});

function tambahProduk(){
 db.collection('produk').add({
  nama:nama.value,
  kategori:(kategori.value||'lainnya').toLowerCase(),
  barcode:barcode.value,
  harga_modal:+modal.value,
  harga_jual:+jual.value,
  stok:+stok.value
 });
}

// kategori auto + toggle
function renderKategori(){
 const list=[...new Set(dataProduk.map(p=>p.kategori||'lainnya'))];
 kategoriFilter.innerHTML='';

 list.forEach(k=>{
  const btn=document.createElement('button');
  btn.innerText=k.toUpperCase();
  btn.className='kategori-btn'+(kategoriAktif===k?' active':'');

  btn.onclick=()=>{
    if(kategoriAktif===k){
      kategoriAktif=null; // reset
    }else{
      kategoriAktif=k;
    }
    renderKategori();
    renderProduk();
  };

  // tombol hapus kategori
  btn.oncontextmenu=(e)=>{
    e.preventDefault();
    if(confirm('Hapus semua produk kategori '+k+'?')){
      dataProduk.forEach((p,i)=>{
        if(p.kategori===k){
          db.collection('produk').doc(docIds[i]).delete();
        }
      });
    }
  };

  kategoriFilter.appendChild(btn);
 });
}

// produk
function renderProduk(){
 const q=search.value?.toLowerCase()||'';
 produkGrid.innerHTML='';

 if(!kategoriAktif) return;

 dataProduk
 .filter(p=>p.kategori===kategoriAktif)
 .filter(p=>p.nama.toLowerCase().includes(q))
 .forEach((p,i)=>{
  const el=document.createElement('div');
  el.className='item';
  el.innerHTML=`<b>${p.nama}</b><br>Rp ${p.harga_jual}<br>Stok:${p.stok}
  <br><button onclick="hapusProduk(${i});event.stopPropagation()">Hapus</button>`;
  el.onclick=()=>addKeranjang(p);
  produkGrid.appendChild(el);
 });
}

function hapusProduk(i){
 if(confirm('Hapus produk?')){
  db.collection('produk').doc(docIds[i]).delete();
 }
}

// keranjang
function addKeranjang(p){
 const ex=keranjangData.find(x=>x.nama===p.nama);
 if(ex){ ex.qty++; ex.total+=p.harga_jual }
 else keranjangData.push({nama:p.nama,harga:p.harga_jual,qty:1,total:p.harga_jual});
 renderKeranjang();
}

function renderKeranjang(){
 let t=0;
 keranjang.innerHTML='';
 keranjangData.forEach((i,idx)=>{
  keranjang.innerHTML+=`<div>${i.nama} x${i.qty} = ${i.total}
  <button onclick="hapusItem(${idx})">X</button></div>`;
  t+=i.total;
 });
 total.innerText=t;
}

function hapusItem(i){
 keranjangData.splice(i,1);
 renderKeranjang();
}

function hitungKembalian(){
 kembalian.innerText = bayar.value-total.innerText;
}

// selesai (fix stok issue)
function selesai(){
 for(const item of keranjangData){
  const index=dataProduk.findIndex(p=>p.nama===item.nama);
  const produk=dataProduk[index];

  if(produk.stok < item.qty){
    alert('❌ Stok tidak cukup untuk '+produk.nama+'\nHapus item ini dulu!');
    return; // STOP transaksi
  }
   function cetakStruk(){
 let s = 'KIOS 88\n================\n';

 keranjangData.forEach(i=>{
  s += `${i.nama} x${i.qty} = Rp ${i.total}\n`;
 });

 s += '----------------\n';
 s += 'TOTAL: Rp ' + total.innerText + '\n';
 s += 'BAYAR: Rp ' + (bayar.value || 0) + '\n';
 s += 'KEMBALI: Rp ' + (kembalian.innerText || 0) + '\n';
 s += '================\n';
 s += 'Terima kasih 🙏';

 const w = window.open('', '', 'width=300,height=600');
 w.document.write('<pre>' + s + '</pre>');
 w.print();
}
 }

 // kalau aman baru lanjut
 keranjangData.forEach(item=>{
  const index=dataProduk.findIndex(p=>p.nama===item.nama);
  const produk=dataProduk[index];

  db.collection('produk').doc(docIds[index]).update({
    stok: produk.stok - item.qty
  });
 });

 keranjangData=[];
 renderKeranjang();
 alert('✅ Transaksi selesai');
}

</script>
</body>
</html>
