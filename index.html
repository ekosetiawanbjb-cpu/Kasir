<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title><b>KIOS 88</b></title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef6ff}
header{background:#1976d2;color:#fff;padding:15px;font-weight:bold}
.container{padding:15px}

.card{
 background:#fff;
 padding:15px;
 margin-bottom:15px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
 padding:8px 12px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 margin:3px;
}

.btn-primary{background:#1976d2;color:#fff}
.btn-danger{background:red;color:#fff}
.btn-warning{background:orange;color:#fff}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
 gap:10px;
}

.item{
 border:1px solid #ddd;
 padding:10px;
 border-radius:8px;
 cursor:pointer;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

#kategoriFilter button{background:#ddd}
#kategoriFilter .active{background:#1976d2;color:#fff}

.modal{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 display:none;
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:#fff;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 KIOS 88 PRO FINAL</header>

<div class="container">

<button class="btn-primary" onclick="toggleForm()">+ Kelola Produk</button>

<div id="formArea" style="display:none" class="card">
<input id="nama" placeholder="Nama">
<input id="kategori" placeholder="Kategori">
<select id="kategoriList"></select>
<input id="barcode" placeholder="Barcode">
<input id="modal" type="number" placeholder="Modal">
<input id="jual" type="number" placeholder="Jual">
<input id="stok" type="number" placeholder="Stok">
<button class="btn-primary" onclick="tambahProduk()">Tambah</button>

<hr>

<input type="file" id="fileInput">
<button onclick="importExcel()">Import Excel</button>
</div>

<div class="card">
<input id="search" placeholder="Cari / Scan Barcode" onkeyup="renderProduk()">
<div id="kategoriFilter"></div>
<div id="produkGrid" class="grid"></div>
</div>

<div class="card">
<div id="keranjang"></div>
<p>Total: Rp <span id="total">0</span></p>

<input id="bayar" placeholder="Bayar">
<button onclick="hitungKembalian()">Hitung</button>

<p>Kembalian: Rp <span id="kembalian">0</span></p>

<button class="btn-primary" onclick="cetakRawBT()">Print Bluetooth</button>
<button class="btn-primary" onclick="selesai()">Selesai</button>
</div>

</div>

<!-- MODAL EDIT -->
<div id="modalEdit" class="modal">
<div class="modal-box">
<h3>Edit Produk</h3>
<input id="editNama">
<input id="editHarga" type="number">
<input id="editStok" type="number">
<br><br>
<button class="btn-primary" onclick="simpanEdit()">Simpan</button>
<button onclick="modalEdit.style.display='none'">Batal</button>
</div>
</div>

<script>
const firebaseConfig={
 apiKey:"AIzaSyDGZ7pQrWMxNXBWP7Dnxqq7M8pheGHaUQ4",
 authDomain:"kios-88.firebaseapp.com",
 projectId:"kios-88"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let dataProduk=[], keranjangData=[], kategoriAktif=null, editId=null;

function toggleForm(){
 formArea.style.display =
 formArea.style.display==='none'?'block':'none';
}

db.collection('produk').onSnapshot(snap=>{
 dataProduk=snap.docs.map(d=>({id:d.id,...d.data()}));
 renderKategori();
 renderProduk();
});

function tambahProduk(){
 if(jual.value < modal.value){
  alert("Harga jual lebih kecil dari modal!");
  return;
 }

 db.collection('produk').add({
  nama:nama.value,
  kategori:(kategori.value||'lainnya').toLowerCase(),
  barcode:barcode.value||'-',
  harga_modal:+modal.value,
  harga_jual:+jual.value,
  stok:+stok.value
 });
}

function importExcel(){
 const file=fileInput.files[0];
 if(!file)return alert("Pilih file");

 const reader=new FileReader();
 reader.onload=e=>{
  const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
  const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  data.forEach(i=>{
   db.collection('produk').add({
    nama:i.nama,
    kategori:(i.kategori||'lainnya').toLowerCase(),
    barcode:i.barcode||'-',
    harga_modal:+i.harga_modal||0,
    harga_jual:+i.harga_jual||0,
    stok:+i.stok||0
   });
  });
 };
 reader.readAsArrayBuffer(file);
}

function renderKategori(){
 const list=[...new Set(dataProduk.map(p=>p.kategori))];
 kategoriFilter.innerHTML='';
 kategoriList.innerHTML='<option value="">--Pilih--</option>';

 list.forEach(k=>{
  const btn=document.createElement('button');
  btn.textContent=k.toUpperCase();

  if(kategoriAktif===k) btn.classList.add('active');

  const del=document.createElement('span');
  del.textContent=' ❌';
  del.onclick=(e)=>{
    e.stopPropagation();
    hapusKategori(k);
  };

  btn.appendChild(del);

  btn.onclick=()=>{
    kategoriAktif=(kategoriAktif===k)?null:k;
    renderKategori();
    renderProduk();
  };

  kategoriFilter.appendChild(btn);

  const opt=document.createElement('option');
  opt.value=k;
  opt.textContent=k;
  kategoriList.appendChild(opt);
 });

 kategoriList.onchange=()=>kategori.value=kategoriList.value;
}

function hapusKategori(k){
 if(!confirm("Hapus semua produk kategori ini?")) return;

 dataProduk
 .filter(p=>p.kategori===k)
 .forEach(p=>{
   db.collection('produk').doc(p.id).delete();
 });
}

function renderProduk(){
 produkGrid.innerHTML='';

 const q = search.value.toLowerCase();

 let filtered = dataProduk;

 // 🔥 kalau ada isi search → override kategori
 if(q){
  filtered = dataProduk.filter(p =>
    p.nama.toLowerCase().includes(q) ||
    p.barcode.includes(q)
  );
 }else{
  // kalau kosong → pakai kategori
  if(!kategoriAktif) return;

  filtered = dataProduk.filter(p =>
    p.kategori === kategoriAktif
  );
 }

 filtered.forEach(p=>{
  const el=document.createElement('div');
  el.className='item';

  el.innerHTML=`
   <div>
     <b>${p.nama}</b><br>
     Rp ${p.harga_jual}<br>
     Stok:${p.stok}
   </div>
  `;

  el.onclick=()=>addKeranjang(p);

  // tombol edit & hapus tetap
  const action=document.createElement('div');
  action.style.display='flex';
  action.style.justifyContent='space-between';

  const edit=document.createElement('button');
  edit.textContent='Edit';
  edit.className='btn-warning';

  const del=document.createElement('button');
  del.textContent='Hapus';
  del.className='btn-danger';

  edit.onclick=(e)=>{e.stopPropagation();bukaEdit(p)};
  del.onclick=(e)=>{e.stopPropagation();hapusProduk(p.id)};

  action.appendChild(edit);
  action.appendChild(del);

  el.appendChild(action);

  produkGrid.appendChild(el);
 });
}

function hapusProduk(id){
 if(confirm("Hapus produk?")){
  db.collection('produk').doc(id).delete();
 }
}

function bukaEdit(p){
 editId=p.id;
 editNama.value=p.nama;
 editHarga.value=p.harga_jual;
 editStok.value=p.stok;
 modalEdit.style.display='flex';
}

function simpanEdit(){
 db.collection('produk').doc(editId).update({
  nama:editNama.value,
  harga_jual:+editHarga.value,
  stok:+editStok.value
 });
 modalEdit.style.display='none';
}

function addKeranjang(p){
 const ex=keranjangData.find(x=>x.id===p.id);

 if(ex){
  if(ex.qty >= p.stok){
    alert("Stok habis");
    return;
  }
  ex.qty++;
  ex.total+=p.harga_jual;
 }else{
  keranjangData.push({
    id:p.id,
    nama:p.nama,
    harga:p.harga_jual,
    qty:1,
    total:p.harga_jual
  });
 }

 renderKeranjang();
}

function renderKeranjang(){
 let t=0;
 keranjang.innerHTML='';

 keranjangData.forEach((i,idx)=>{
  keranjang.innerHTML+=`
    ${i.nama} x${i.qty} = Rp ${i.total}
    <button onclick="hapusItem(${idx})">X</button><br>
  `;
  t+=i.total;
 });

 total.textContent=t;
}

function hapusItem(i){
 keranjangData.splice(i,1);
 renderKeranjang();
}

function hitungKembalian(){
 const totalBelanja=Number(total.textContent||0);
 const uang=Number(bayar.value||0);
 const kembali=uang-totalBelanja;
 kembalian.textContent = kembali>=0 ? kembali : 0;
}

// 🔥 GLOBAL (taruh di atas script)
let nomorTransaksi = Number(localStorage.getItem("trx") || 1);

// 🔥 HELPER
function wrapText(text, max){
  let lines = [];
  while(text.length > max){
    lines.push(text.substring(0, max));
    text = text.substring(max);
  }
  lines.push(text);
  return lines;
}

function padRight(text, length){
  return text + " ".repeat(Math.max(0, length - text.length));
}

function padLeft(text, length){
  return " ".repeat(Math.max(0, length - text.length)) + text;
}

// 🔥 STRUK PREMIUM FINAL
function generateStruk(){

  const width = 32;

  const totalBelanja = Number(total.textContent || 0);
  const bayarUang = Number(bayar.value || 0);
  const kembali = bayarUang - totalBelanja;

  const now = new Date();
  const tanggal = now.toLocaleDateString('id-ID');
  const jam = now.toLocaleTimeString('id-ID');

  const trx = "TRX" + String(nomorTransaksi).padStart(4, '0');

  let s = "";

  // HEADER
  s += "\x1B\x45\x01"; // 🔥 ON BOLD
  s += padLeft("KIOS 88", (width + "KIOS 88".length)/2) + "\n";
  s += "\x1B\x45\x00"; // OFF BOLD
  s += "-".repeat(width) + "\n";

  s += "No  : " + trx + "\n";
  s += "Tgl : " + tanggal + "\n";
  s += "Jam : " + jam + "\n";
  s += "-".repeat(width) + "\n";

  // PRODUK
  keranjangData.forEach(item => {

    let namaLines = wrapText(item.nama, width);

    namaLines.forEach(line => {
      s += line + "\n";
    });

    let kiri = item.qty + " x " + item.harga.toLocaleString('id-ID');
    let kanan = item.total.toLocaleString('id-ID');

    s += padRight(kiri, width - kanan.length) + kanan + "\n";
  });

  s += "-".repeat(width) + "\n";

  // TOTAL
  s += padRight("Total", width - totalBelanja.toLocaleString('id-ID').length) 
       + totalBelanja.toLocaleString('id-ID') + "\n";

  s += padRight("Bayar", width - bayarUang.toLocaleString('id-ID').length) 
       + bayarUang.toLocaleString('id-ID') + "\n";

  let kembaliFix = kembali >= 0 ? kembali : 0;

  s += padRight("Kembali", width - kembaliFix.toLocaleString('id-ID').length) 
       + kembaliFix.toLocaleString('id-ID') + "\n";

  s += "-".repeat(width) + "\n";

  // FOOTER
  s += "\x1B\x45\x01";
  s += padLeft("Terima Kasih", (width + "Terima Kasih".length)/2) + "\n";
  s += padLeft("KIOS 88", (width + "KIOS 88".length)/2) + "\n\n\n";
  s += "\x1B\x45\x00";
  return s;
}

window.cetakRawBT = function(){
  const text = generateStruk(); // 🔥 INI KUNCINYA
  if(navigator.share){
    navigator.share({
      text: text
    });
  }
  else{
    alert("Browser tidak support share");
  }
}

// 🔥 UPDATE DI FUNCTION selesai()
function selesai(){

  for(const item of keranjangData){
    const p=dataProduk.find(x=>x.id===item.id);
    if(p.stok < item.qty){
      alert("Stok tidak cukup!");
      return;
    }
  }

 keranjangData.forEach(item=>{
  const p=dataProduk.find(x=>x.id===item.id);
  db.collection('produk').doc(p.id).update({
    stok:p.stok-item.qty
  });
 });

  nomorTransaksi++;
  localStorage.setItem("trx", nomorTransaksi);

  keranjangData=[];
  renderKeranjang();

  alert("Transaksi selesai!");
}
</script>

</body>
</html>
