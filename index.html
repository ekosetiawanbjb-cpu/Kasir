<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KIOS 88 STABLE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef6ff}
header{background:#1976d2;color:#fff;padding:15px}
.container{padding:15px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
button{padding:8px;margin:4px;border:none;border-radius:8px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.item{border:1px solid #ccc;padding:10px;border-radius:8px}
</style>
</head>

<body>

<header>🔥 KIOS 88 STABLE</header>

<div class="container">

<button onclick="toggleForm()">+ Kelola Produk</button>

<div id="formArea" style="display:none" class="card">
<input id="nama" placeholder="Nama">
<input id="kategori" placeholder="Kategori">
<input id="barcode" placeholder="Barcode">
<input id="modal" type="number" placeholder="Modal">
<input id="jual" type="number" placeholder="Jual">
<input id="stok" type="number" placeholder="Stok">
<button onclick="tambahProduk()">Tambah</button>
</div>

<div class="card">
<input id="search" placeholder="Cari..." onkeyup="renderProduk()">
<div id="kategoriFilter"></div>
<div id="produkGrid" class="grid"></div>
</div>

<div class="card">
<div id="keranjang"></div>
<p>Total: Rp <span id="total">0</span></p>
<input id="bayar" placeholder="Bayar">
<button onclick="hitungKembalian()">Hitung</button>
<p>Kembalian: Rp <span id="kembalian">0</span></p>
<button onclick="cetakRawBT()">Print Bluetooth</button>
</div>

</div>

<script>

const firebaseConfig={
 apiKey:"AIzaSyDGZ7pQrWMxNXBWP7Dnxqq7M8pheGHaUQ4",
 authDomain:"kios-88.firebaseapp.com",
 projectId:"kios-88"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let dataProduk=[], keranjangData=[], kategoriAktif=null;

function toggleForm(){
 formArea.style.display =
 formArea.style.display==='none'?'block':'none';
}

db.collection('produk').onSnapshot(snap=>{
 dataProduk=snap.docs.map(d=>({id:d.id,...d.data()}));
 renderKategori();
 renderProduk();
});

function tambahProduk(){
 db.collection('produk').add({
  nama:nama.value,
  kategori:(kategori.value||'lainnya'),
  barcode:barcode.value||'-',
  harga_modal:+modal.value,
  harga_jual:+jual.value,
  stok:+stok.value
 });
}

function renderKategori(){
 const list=[...new Set(dataProduk.map(p=>p.kategori))];
 kategoriFilter.innerHTML='';
 list.forEach(k=>{
  const btn=document.createElement('button');
  btn.textContent=k.toUpperCase();
  btn.onclick=()=>{
    kategoriAktif=(kategoriAktif===k)?null:k;
    renderProduk();
  };
  kategoriFilter.appendChild(btn);
 });
}

function renderProduk(){
 produkGrid.innerHTML='';
 if(!kategoriAktif)return;

 dataProduk
 .filter(p=>p.kategori===kategoriAktif)
 .forEach(p=>{
  const div=document.createElement('div');
  div.className='item';
  div.innerHTML=`${p.nama}<br>Rp ${p.harga_jual}`;
  div.onclick=()=>addKeranjang(p);
  produkGrid.appendChild(div);
 });
}

function addKeranjang(p){
 keranjangData.push(p);
 renderKeranjang();
}

function renderKeranjang(){
 let t=0;
 keranjang.innerHTML='';
 keranjangData.forEach(p=>{
  keranjang.innerHTML+=p.nama+'<br>';
  t+=p.harga_jual;
 });
 total.textContent=t;
}

function hitungKembalian(){
 const kembali = bayar.value - total.textContent;
 kembalian.textContent = kembali;
}

function generateStruk(){
 let s='KIOS 88\n';
 keranjangData.forEach(i=>{
  s+=i.nama+' '+i.harga_jual+'\n';
 });
 s+='Total:'+total.textContent;
 return s;
}

function cetakRawBT(){
 const text = encodeURIComponent(generateStruk());
 window.location.href='rawbt://print?text='+text;
}

</script>

</body>
</html>
